blueprint:
  name: Pico Room Controller (Draft v0.1.3)
  description: >
    Lutron Pico room controller with multi-remote support. Uses restart mode so a new
    button press cancels in-progress hold-repeat (avoids runaway dimming). ON goes to
    100% brightness. Middle default: short press recalls a Scene, long press snapshots
    selected lights into that scene (override with Custom middle actions).
  domain: automation
  input:
    pico_devices:
      name: Pico remotes
      description: One or more Pico devices that should control this same target.
      selector:
        device:
          multiple: true

    light_target:
      name: Lights target
      description: Select lights by entity/device/area/group target.
      selector:
        target:
          entity:
            domain: light

    button_on:
      name: ON button number
      default: 2
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box

    button_off:
      name: OFF button number
      default: 4
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box

    button_up:
      name: UP button number
      default: 3
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box

    button_down:
      name: DOWN button number
      default: 5
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box

    button_middle:
      name: MIDDLE button number
      default: 1
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box

    step_percent:
      name: Dim step percent
      default: 8
      selector:
        number:
          min: 1
          max: 50
          step: 1
          mode: slider

    hold_start_seconds:
      name: Hold threshold (seconds)
      default: 0.5
      selector:
        number:
          min: 0.1
          max: 2.0
          step: 0.1
          mode: box

    repeat_interval_seconds:
      name: Hold repeat interval (seconds)
      default: 0.1
      selector:
        number:
          min: 0.05
          max: 1.0
          step: 0.05
          mode: box

    middle_long_hold_seconds:
      name: Middle long-hold threshold (seconds)
      default: 3.0
      selector:
        number:
          min: 1.0
          max: 10.0
          step: 0.5
          mode: box

    middle_behavior:
      name: Middle button behavior
      description: >
        Favorite scene: short press turns ON the scene you pick; long press saves a
        snapshot of the selected lights into that scene. Custom: use the action fields below.
      default: favorite_scene
      selector:
        select:
          options:
            - label: Favorite scene (short = recall, long = save snapshot)
              value: favorite_scene
            - label: Custom actions (short/long fields below)
              value: custom

    favorite_scene:
      name: Favorite scene entity
      description: >
        Create a Scene in Settings → Helpers (or use an existing scene entity). Its states
        are overwritten on long press by scene.create snapshot. Short press runs scene.turn_on.
      selector:
        entity:
          domain: scene

    favorite_snapshot_entities:
      name: Favorite snapshot — light entities
      description: >
        Lights captured on middle long press. Home Assistant needs explicit light entity IDs
        here (cannot snapshot an area/group target). Pick the same lights as “Lights target” when possible.
      default: []
      selector:
        entity:
          domain: light
          multiple: true

    action_middle_immediate:
      name: Middle immediate action (optional)
      description: Runs on middle press for both Favorite and Custom modes.
      default: []
      selector:
        action: {}

    action_middle_short:
      name: Middle short-hold — custom actions only
      description: >
        Only used when Middle behavior = Custom. Favorite scene mode uses scene.turn_on instead.
      default: []
      selector:
        action: {}

    action_middle_long:
      name: Middle long-hold — custom actions only
      description: >
        Only used when Middle behavior = Custom. Favorite scene mode uses scene.create instead.
      default: []
      selector:
        action: {}

    debug_notify:
      name: Debug — notify every Pico event (press only)
      description: >
        Sends a persistent notification with device_id, button_number, and action.
        Turn off after mapping buttons. Helps when hold/release logic is unclear.
      default: false
      selector:
        boolean: {}

    debug_notify_middle:
      name: Debug — notify when middle short or long runs
      description: >
        Persistent notification when middle short-hold or long-hold path runs.
        Use to verify timing; configure real actions in the middle action fields above.
      default: false
      selector:
        boolean: {}

# Restart: a new Pico *press* cancels any in-progress UP/DOWN repeat loops on this
# automation. Prevents “stuck dimming” when parallel runs fought each other.
mode: restart

trigger:
  - platform: event
    event_type: lutron_caseta_button_event

variables:
  pico_devices_v: !input pico_devices
  target_lights_v: !input light_target
  btn_on_v: !input button_on
  btn_off_v: !input button_off
  btn_up_v: !input button_up
  btn_down_v: !input button_down
  btn_middle_v: !input button_middle
  step_pct_v: !input step_percent
  hold_start_v: !input hold_start_seconds
  repeat_interval_v: !input repeat_interval_seconds
  middle_long_v: !input middle_long_hold_seconds
  debug_notify_v: !input debug_notify
  debug_notify_middle_v: !input debug_notify_middle
  middle_behavior_v: !input middle_behavior
  favorite_scene_v: !input favorite_scene
  favorite_snapshot_v: !input favorite_snapshot_entities
  favorite_scene_id_v: "{% if favorite_scene_v %}{{ favorite_scene_v[6:] if favorite_scene_v.startswith('scene.') else favorite_scene_v }}{% endif %}"
  dev: "{{ trigger.event.data.device_id }}"
  btn: "{{ trigger.event.data.button_number | int(0) }}"
  act: "{{ trigger.event.data.action | lower }}"

condition:
  - condition: template
    value_template: "{{ dev in pico_devices_v }}"
  - condition: template
    value_template: "{{ act == 'press' }}"

action:
  - if:
      - condition: template
        value_template: "{{ debug_notify_v }}"
    then:
      - service: persistent_notification.create
        data:
          title: Pico debug (press)
          message: >
            device_id={{ dev }},
            button={{ btn | int }},
            action={{ act }},
            raw={{ trigger.event.data | to_json }}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ (btn | int) == (btn_on_v | int) }}"
        sequence:
          - service: light.turn_on
            target: !input light_target
            data:
              brightness_pct: 100

      - conditions:
          - condition: template
            value_template: "{{ (btn | int) == (btn_off_v | int) }}"
        sequence:
          - service: light.turn_off
            target: !input light_target

      - conditions:
          - condition: template
            value_template: "{{ (btn | int) == (btn_up_v | int) }}"
        sequence:
          - service: light.turn_on
            target: !input light_target
            data:
              brightness_step_pct: "{{ step_pct_v | int }}"

          - wait_for_trigger:
              - platform: event
                event_type: lutron_caseta_button_event
                event_data:
                  device_id: "{{ dev }}"
            timeout:
              seconds: "{{ hold_start_v | float }}"
            continue_on_timeout: true

          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ wait.trigger is none or
                         wait.trigger.event.data.device_id != dev or
                         (wait.trigger.event.data.button_number | int(0)) != (btn | int) or
                         (wait.trigger.event.data.action | lower) != 'release' }}
                sequence:
                  - repeat:
                      sequence:
                        - service: light.turn_on
                          target: !input light_target
                          data:
                            brightness_step_pct: "{{ step_pct_v | int }}"
                        - wait_for_trigger:
                            - platform: event
                              event_type: lutron_caseta_button_event
                              event_data:
                                device_id: "{{ dev }}"
                          timeout:
                            seconds: "{{ repeat_interval_v | float }}"
                          continue_on_timeout: true
                      until:
                        - condition: template
                          value_template: >
                            {{ wait.trigger is not none and
                               wait.trigger.event.data.device_id == dev and
                               (wait.trigger.event.data.button_number | int(0)) == (btn | int) and
                               (wait.trigger.event.data.action | lower) == 'release' }}

      - conditions:
          - condition: template
            value_template: "{{ (btn | int) == (btn_down_v | int) }}"
        sequence:
          - service: light.turn_on
            target: !input light_target
            data:
              brightness_step_pct: "{{ (step_pct_v | int) * -1 }}"

          - wait_for_trigger:
              - platform: event
                event_type: lutron_caseta_button_event
                event_data:
                  device_id: "{{ dev }}"
            timeout:
              seconds: "{{ hold_start_v | float }}"
            continue_on_timeout: true

          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ wait.trigger is none or
                         wait.trigger.event.data.device_id != dev or
                         (wait.trigger.event.data.button_number | int(0)) != (btn | int) or
                         (wait.trigger.event.data.action | lower) != 'release' }}
                sequence:
                  - repeat:
                      sequence:
                        - service: light.turn_on
                          target: !input light_target
                          data:
                            brightness_step_pct: "{{ (step_pct_v | int) * -1 }}"
                        - wait_for_trigger:
                            - platform: event
                              event_type: lutron_caseta_button_event
                              event_data:
                                device_id: "{{ dev }}"
                          timeout:
                            seconds: "{{ repeat_interval_v | float }}"
                          continue_on_timeout: true
                      until:
                        - condition: template
                          value_template: >
                            {{ wait.trigger is not none and
                               wait.trigger.event.data.device_id == dev and
                               (wait.trigger.event.data.button_number | int(0)) == (btn | int) and
                               (wait.trigger.event.data.action | lower) == 'release' }}

      - conditions:
          - condition: template
            value_template: "{{ (btn | int) == (btn_middle_v | int) }}"
        sequence:
          - sequence: !input action_middle_immediate

          - wait_for_trigger:
              - platform: event
                event_type: lutron_caseta_button_event
                event_data:
                  device_id: "{{ dev }}"
            timeout:
              seconds: "{{ middle_long_v | float }}"
            continue_on_timeout: true

          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ wait.trigger is not none and
                         wait.trigger.event.data.device_id == dev and
                         (wait.trigger.event.data.button_number | int(0)) == (btn | int) and
                         (wait.trigger.event.data.action | lower) == 'release' }}
                sequence:
                  - if:
                      - condition: template
                        value_template: "{{ debug_notify_middle_v }}"
                    then:
                      - service: persistent_notification.create
                        data:
                          title: Pico middle — short hold
                          message: >-
                            Mode={{ middle_behavior_v }} (button {{ btn | int }}, device {{ dev }}).
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: >-
                              {{ middle_behavior_v == 'favorite_scene' and
                                 (favorite_scene_v | default('', true) | length) > 0 }}
                        sequence:
                          - service: scene.turn_on
                            target:
                              entity_id: "{{ favorite_scene_v }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ middle_behavior_v == 'custom' }}"
                        sequence: !input action_middle_short
            default:
              - sequence:
                  - if:
                      - condition: template
                        value_template: "{{ debug_notify_middle_v }}"
                    then:
                      - service: persistent_notification.create
                        data:
                          title: Pico middle — long hold
                          message: >-
                            Mode={{ middle_behavior_v }} (button {{ btn | int }}, device {{ dev }}).
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: >-
                              {{ middle_behavior_v == 'favorite_scene' and
                                 (favorite_scene_v | default('', true) | length) > 0 and
                                 (favorite_snapshot_v | default([]) | length) > 0 }}
                        sequence:
                          - service: scene.create
                            data:
                              scene_id: "{{ favorite_scene_id_v }}"
                              snapshot_entities: !input favorite_snapshot_entities
                      - conditions:
                          - condition: template
                            value_template: "{{ middle_behavior_v == 'custom' }}"
                        sequence: !input action_middle_long
