blueprint:
  name: Pico Room Controller (Draft v0.1.7)
  description: >
    Lutron Pico room controller with multi-remote support. Uses restart mode so a new
    button press cancels in-progress hold-repeat (avoids runaway dimming). ON goes to
    100% brightness. Middle default: short press recalls a favorite Scene, or its
    temporary override if set; long press saves a temporary snapshot until Home Assistant
    restarts, then flashes the lights to confirm.
    Optional Input number helpers store button digits so you set them once and reuse.
  domain: automation
  input:
    pico_devices:
      name: Pico remotes
      description: One or more Pico devices that should control this same target.
      selector:
        device:
          multiple: true

    light_target:
      name: Lights target
      description: Select lights by entity/device/area/group target.
      selector:
        target:
          entity:
            domain: light

    button_on:
      name: "On — Caseta button number (see Lutron list in README)"
      description: Used if no helper is set below. Typical 5-button Pico On = 2.
      default: 2
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box

    button_off:
      name: "Off — Caseta button number"
      description: Typical 5-button Pico Off = 4.
      default: 4
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box

    button_up:
      name: "Raise / up paddle — button number"
      description: Typical 5-button Pico = 3.
      default: 5
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box

    button_down:
      name: "Lower / down paddle — button number"
      description: Typical 5-button Pico = 5.
      default: 6
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box

    button_middle:
      name: "Middle / favorite — button number"
      description: Typical 5-button Pico center = 1 (your bridge may differ — use Debug).
      default: 3
      selector:
        number:
          min: 1
          max: 10
          step: 1
          mode: box

    helper_button_on:
      name: "Optional — Input number helper for On digit"
      description: >
        Helpers → Create helper → Number (min 1, max 10, step 1). Set its value to your
        Caseta On button number. When set, it overrides “On — Caseta button number” above
        so you can reuse one helper across automations.
      default: ""
      selector:
        entity:
          domain: input_number

    helper_button_off:
      name: "Optional — helper for Off digit"
      default: ""
      selector:
        entity:
          domain: input_number

    helper_button_up:
      name: "Optional — helper for Raise digit"
      default: ""
      selector:
        entity:
          domain: input_number

    helper_button_down:
      name: "Optional — helper for Lower digit"
      default: ""
      selector:
        entity:
          domain: input_number

    helper_button_middle:
      name: "Optional — helper for Middle digit"
      default: ""
      selector:
        entity:
          domain: input_number

    step_percent:
      name: Dim step percent
      default: 8
      selector:
        number:
          min: 1
          max: 50
          step: 1
          mode: slider

    hold_start_seconds:
      name: Hold threshold (seconds)
      default: 0.5
      selector:
        number:
          min: 0.1
          max: 2.0
          step: 0.1
          mode: box

    repeat_interval_seconds:
      name: Hold repeat interval (seconds)
      default: 0.1
      selector:
        number:
          min: 0.05
          max: 1.0
          step: 0.05
          mode: box

    middle_long_hold_seconds:
      name: Middle long-hold threshold (seconds)
      default: 3.0
      selector:
        number:
          min: 1.0
          max: 10.0
          step: 0.5
          mode: box

    middle_behavior:
      name: Middle button behavior
      description: >
        Favorite scene: short press turns ON the scene you pick, unless a temporary
        favorite was saved by long press. Long press creates a temporary snapshot scene
        named after the selected scene with "_temp" appended; that override is used for
        later short presses until Home Assistant restarts/reloads scenes, and the lights
        flash after the snapshot is saved. Custom: use the action fields below.
      default: favorite_scene
      selector:
        select:
          options:
            - label: Favorite scene (short = recall, long = temporary snapshot)
              value: favorite_scene
            - label: Custom actions (short/long fields below)
              value: custom

    favorite_scene:
      name: Favorite scene entity
      description: >
        Create a Scene in Settings → Helpers (or use an existing scene entity). Short press
        runs scene.turn_on for this scene, unless a temporary override exists. Long press
        creates a temporary scene.create snapshot using this scene ID plus "_temp", so
        later short presses recall the snapshot until Home Assistant restarts/reloads
        scenes, then flashes the lights to confirm.
      default: ""
      selector:
        entity:
          domain: scene

    favorite_snapshot_entities:
      name: Favorite temporary snapshot — light entities
      description: >
        Lights captured into the temporary favorite on middle long press. Home Assistant
        needs explicit light entity IDs here (cannot snapshot an area/group target). Pick
        the same lights as “Lights target” when possible.
      default: []
      selector:
        entity:
          domain: light
          multiple: true

    action_middle_immediate:
      name: Middle immediate action (optional)
      description: Runs on middle press for both Favorite and Custom modes.
      default: []
      selector:
        action: {}

    action_middle_short:
      name: Middle short-hold — custom actions only
      description: >
        Only used when Middle behavior = Custom. Favorite scene mode recalls the selected
        scene, or its temporary override if one was saved since the last restart.
      default: []
      selector:
        action: {}

    action_middle_long:
      name: Middle long-hold — custom actions only
      description: >
        Only used when Middle behavior = Custom. Favorite scene mode creates a temporary
        scene.create snapshot and flashes the lights instead.
      default: []
      selector:
        action: {}

    debug_notify:
      name: Debug — notify every Pico event (press only)
      description: >
        Sends a persistent notification with device_id, button_number, and action.
        Turn off after mapping buttons. Helps when hold/release logic is unclear.
      default: false
      selector:
        boolean: {}

    debug_notify_middle:
      name: Debug — notify when middle short or long runs
      description: >
        Persistent notification when middle short-hold or long-hold path actually runs
        scene/actions. Use together with Debug every Pico event when troubleshooting.
      default: false
      selector:
        boolean: {}

    middle_warn_misconfig:
      name: Notify if middle action is skipped (setup incomplete)
      description: >
        When Favorite scene mode is on but Favorite scene or snapshot lights are missing,
        or Custom mode but actions are empty, send a persistent notification explaining why.
      default: true
      selector:
        boolean: {}

# Restart: a new Pico *press* cancels any in-progress UP/DOWN repeat loops on this
# automation. Prevents “stuck dimming” when parallel runs fought each other.
mode: restart

trigger:
  - platform: event
    event_type: lutron_caseta_button_event

variables:
  pico_devices_v: !input pico_devices
  target_lights_v: !input light_target
  _btn_on: !input button_on
  _btn_off: !input button_off
  _btn_up: !input button_up
  _btn_down: !input button_down
  _btn_middle: !input button_middle
  _h_on: !input helper_button_on
  _h_off: !input helper_button_off
  _h_up: !input helper_button_up
  _h_down: !input helper_button_down
  _h_middle: !input helper_button_middle
  btn_on_v: "{{ states(_h_on) | int(_btn_on) if _h_on else _btn_on }}"
  btn_off_v: "{{ states(_h_off) | int(_btn_off) if _h_off else _btn_off }}"
  btn_up_v: "{{ states(_h_up) | int(_btn_up) if _h_up else _btn_up }}"
  btn_down_v: "{{ states(_h_down) | int(_btn_down) if _h_down else _btn_down }}"
  btn_middle_v: "{{ states(_h_middle) | int(_btn_middle) if _h_middle else _btn_middle }}"
  step_pct_v: !input step_percent
  hold_start_v: !input hold_start_seconds
  repeat_interval_v: !input repeat_interval_seconds
  middle_long_v: !input middle_long_hold_seconds
  debug_notify_v: !input debug_notify
  debug_notify_middle_v: !input debug_notify_middle
  middle_warn_misconfig_v: !input middle_warn_misconfig
  middle_behavior_v: !input middle_behavior
  middle_mode_v: "{{ (middle_behavior_v | default('favorite_scene') | lower | trim) }}"
  favorite_scene_v: !input favorite_scene
  favorite_snapshot_v: !input favorite_snapshot_entities
  favorite_scene_id_v: "{% if favorite_scene_v %}{{ favorite_scene_v[6:] if favorite_scene_v.startswith('scene.') else favorite_scene_v }}{% endif %}"
  favorite_temp_scene_id_v: "{% if favorite_scene_id_v %}{{ favorite_scene_id_v }}_temp{% endif %}"
  favorite_temp_scene_v: "{% if favorite_temp_scene_id_v %}scene.{{ favorite_temp_scene_id_v }}{% endif %}"
  favorite_active_scene_v: >-
    {% if favorite_temp_scene_v and (expand(favorite_temp_scene_v) | list | count > 0) %}
      {{ favorite_temp_scene_v }}
    {% else %}
      {{ favorite_scene_v }}
    {% endif %}
  dev: "{{ trigger.event.data.device_id }}"
  btn: "{{ trigger.event.data.button_number | int(0) }}"
  act: "{{ trigger.event.data.action | lower }}"

condition:
  - condition: template
    value_template: "{{ dev in pico_devices_v }}"
  - condition: template
    value_template: "{{ act == 'press' }}"

action:
  - if:
      - condition: template
        value_template: "{{ debug_notify_v }}"
    then:
      - service: persistent_notification.create
        data:
          title: Pico debug (press)
          message: >
            device_id={{ dev }},
            button={{ btn | int }},
            action={{ act }},
            raw={{ trigger.event.data | to_json }}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ (btn | int) == (btn_on_v | int) }}"
        sequence:
          - service: light.turn_on
            target: !input light_target
            data:
              brightness_pct: 100

      - conditions:
          - condition: template
            value_template: "{{ (btn | int) == (btn_off_v | int) }}"
        sequence:
          - service: light.turn_off
            target: !input light_target

      - conditions:
          - condition: template
            value_template: "{{ (btn | int) == (btn_up_v | int) }}"
        sequence:
          - service: light.turn_on
            target: !input light_target
            data:
              brightness_step_pct: "{{ step_pct_v | int }}"

          - wait_for_trigger:
              - platform: event
                event_type: lutron_caseta_button_event
                event_data:
                  device_id: "{{ dev }}"
            timeout:
              seconds: "{{ hold_start_v | float }}"
            continue_on_timeout: true

          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ wait.trigger is none or
                         wait.trigger.event.data.device_id != dev or
                         (wait.trigger.event.data.button_number | int(0)) != (btn | int) or
                         (wait.trigger.event.data.action | lower) != 'release' }}
                sequence:
                  - repeat:
                      sequence:
                        - service: light.turn_on
                          target: !input light_target
                          data:
                            brightness_step_pct: "{{ step_pct_v | int }}"
                        - wait_for_trigger:
                            - platform: event
                              event_type: lutron_caseta_button_event
                              event_data:
                                device_id: "{{ dev }}"
                          timeout:
                            seconds: "{{ repeat_interval_v | float }}"
                          continue_on_timeout: true
                      until:
                        - condition: template
                          value_template: >
                            {{ wait.trigger is not none and
                               wait.trigger.event.data.device_id == dev and
                               (wait.trigger.event.data.button_number | int(0)) == (btn | int) and
                               (wait.trigger.event.data.action | lower) == 'release' }}

      - conditions:
          - condition: template
            value_template: "{{ (btn | int) == (btn_down_v | int) }}"
        sequence:
          - service: light.turn_on
            target: !input light_target
            data:
              brightness_step_pct: "{{ (step_pct_v | int) * -1 }}"

          - wait_for_trigger:
              - platform: event
                event_type: lutron_caseta_button_event
                event_data:
                  device_id: "{{ dev }}"
            timeout:
              seconds: "{{ hold_start_v | float }}"
            continue_on_timeout: true

          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ wait.trigger is none or
                         wait.trigger.event.data.device_id != dev or
                         (wait.trigger.event.data.button_number | int(0)) != (btn | int) or
                         (wait.trigger.event.data.action | lower) != 'release' }}
                sequence:
                  - repeat:
                      sequence:
                        - service: light.turn_on
                          target: !input light_target
                          data:
                            brightness_step_pct: "{{ (step_pct_v | int) * -1 }}"
                        - wait_for_trigger:
                            - platform: event
                              event_type: lutron_caseta_button_event
                              event_data:
                                device_id: "{{ dev }}"
                          timeout:
                            seconds: "{{ repeat_interval_v | float }}"
                          continue_on_timeout: true
                      until:
                        - condition: template
                          value_template: >
                            {{ wait.trigger is not none and
                               wait.trigger.event.data.device_id == dev and
                               (wait.trigger.event.data.button_number | int(0)) == (btn | int) and
                               (wait.trigger.event.data.action | lower) == 'release' }}

      - conditions:
          - condition: template
            value_template: "{{ (btn | int) == (btn_middle_v | int) }}"
        sequence:
          - sequence: !input action_middle_immediate

          - wait_for_trigger:
              - platform: event
                event_type: lutron_caseta_button_event
                event_data:
                  device_id: "{{ dev }}"
            timeout:
              seconds: "{{ middle_long_v | float }}"
            continue_on_timeout: true

          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ wait.trigger is not none and
                         wait.trigger.event.data.device_id == dev and
                         (wait.trigger.event.data.button_number | int(0)) == (btn | int) and
                         (wait.trigger.event.data.action | lower) == 'release' }}
                sequence:
                  - if:
                      - condition: template
                        value_template: "{{ debug_notify_middle_v }}"
                    then:
                      - service: persistent_notification.create
                        data:
                          title: Pico middle — short hold
                          message: >-
                            Mode={{ middle_mode_v }} (button {{ btn | int }}, device {{ dev }}).
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: >-
                              {{ middle_mode_v == 'favorite_scene' and
                                 (favorite_scene_v | default('', true) | string | length) > 0 }}
                        sequence:
                          - service: scene.turn_on
                            target:
                              entity_id:
                                - "{{ favorite_active_scene_v | trim }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ middle_mode_v == 'custom' }}"
                        sequence: !input action_middle_short
                    default:
                      - if:
                          - condition: template
                            value_template: "{{ middle_warn_misconfig_v }}"
                        then:
                          - service: persistent_notification.create
                            data:
                              title: Pico middle (short) — nothing ran
                              message: >-
                                Middle short path had no action. Favorite mode needs a
                                Favorite scene entity. Custom mode needs Middle short-hold actions.
                                Mode={{ middle_mode_v }}, scene_set={{ (favorite_scene_v | default('', true) | string | length) > 0 }}.
            default:
              - sequence:
                - if:
                    - condition: template
                      value_template: "{{ debug_notify_middle_v }}"
                  then:
                    - service: persistent_notification.create
                      data:
                        title: Pico middle — long hold
                        message: >-
                          Mode={{ middle_mode_v }} (button {{ btn | int }}, device {{ dev }}).
                - choose:
                    - conditions:
                        - condition: template
                          value_template: >-
                            {{ middle_mode_v == 'favorite_scene' and
                               (favorite_scene_v | default('', true) | string | length) > 0 and
                               (favorite_snapshot_v | default([]) | length) > 0 }}
                      sequence:
                        - service: scene.create
                          data:
                            scene_id: "{{ favorite_temp_scene_id_v }}"
                            snapshot_entities: !input favorite_snapshot_entities
                        - service: light.turn_on
                          target: !input light_target
                          data:
                            flash: short
                    - conditions:
                        - condition: template
                          value_template: "{{ middle_mode_v == 'custom' }}"
                      sequence: !input action_middle_long
                  default:
                    - if:
                        - condition: template
                          value_template: "{{ middle_warn_misconfig_v }}"
                      then:
                        - service: persistent_notification.create
                          data:
                            title: Pico middle (long) — nothing ran
                            message: >-
                              Middle long path had no action. Favorite mode needs a Favorite
                              scene AND at least one light under Favorite snapshot. Custom mode
                              needs Middle long-hold actions.
                              Mode={{ middle_mode_v }}, scene={{ (favorite_scene_v | default('', true) | string | length) > 0 }},
                              snapshots={{ favorite_snapshot_v | default([]) | length }}.
